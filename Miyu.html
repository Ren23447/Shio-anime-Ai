<!doctype html>
<link rel="icon" type="image/x-icon" href="https://raw.githubusercontent.com/Ren23447/Miyu-Anime-Ai/refs/heads/main/Favicon.png">
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta
            name="viewport"
            content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
        />
        <title>望結 (Miyu)</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        <style>
            :root {
                --blue:        #3b82f6;
                --blue-dark:   #2563eb;
                --purple:      #8b5cf6;
                --purple-dark: #7c3aed;
                --pink:        #ec4899;
                --pink-soft:   #f472b6;
                --grey-1:      #1a1a2e;
                --grey-2:      #16213e;
                --grey-border: rgba(139, 92, 246, 0.18);
                --glass-bg:    rgba(30, 20, 60, 0.55);
                --text-dim:    rgba(200, 180, 255, 0.55);
            }

            body {
                margin: 0;
                overflow: hidden;
                background-color: var(--grey-1);
                font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
                user-select: none;
                -webkit-user-select: none;
                color: white;
            }

            #canvas-container {
                width: 100vw;
                height: 100vh;
                display: block;
            }

            /* ── UI Overlay ── */
            #ui-overlay {
                position: absolute;
                inset: 0;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                padding: 20px;
                pointer-events: none;
                z-index: 100;
            }

            /* ── Header ── */
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                pointer-events: auto;
            }

            .glass-panel {
                background: var(--glass-bg);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
                border: 1px solid var(--grey-border);
                border-radius: 20px;
                padding: 12px 22px;
                box-shadow:
                    0 8px 32px rgba(0, 0, 0, 0.4),
                    0 0 0 1px rgba(139, 92, 246, 0.08) inset;
            }

            .shio-tag {
                display: flex;
                align-items: center;
                gap: 12px;
            }

            .status-dot {
                width: 8px;
                height: 8px;
                background: var(--pink-soft);
                border-radius: 50%;
                box-shadow: 0 0 10px var(--pink-soft), 0 0 20px rgba(244, 114, 182, 0.4);
                animation: statusPulse 2.5s ease-in-out infinite;
            }

            @keyframes statusPulse {
                0%, 100% { opacity: 1; transform: scale(1); }
                50%       { opacity: 0.7; transform: scale(0.85); }
            }

            .shio-tag span {
                font-weight: 600;
                letter-spacing: 1px;
                background: linear-gradient(90deg, var(--blue) 0%, var(--purple) 50%, var(--pink) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                font-size: 15px;
            }

            /* ── Chat Area ── */
            #chat-container {
                width: 100%;
                max-width: 500px;
                margin: 0 auto;
                display: flex;
                flex-direction: column;
                gap: 14px;
                pointer-events: auto;
            }

            #chat-history {
                max-height: 250px;
                overflow-y: auto;
                display: flex;
                flex-direction: column;
                gap: 10px;
                padding-right: 8px;
                scrollbar-width: none;
                mask-image: linear-gradient(to bottom, transparent, black 22%);
            }

            #chat-history::-webkit-scrollbar {
                display: none;
            }

            .message {
                padding: 11px 18px;
                border-radius: 18px;
                font-size: 14.5px;
                line-height: 1.55;
                max-width: 85%;
                animation: slideUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
                font-weight: 400;
                letter-spacing: 0.01em;
            }

            @keyframes slideUp {
                from { opacity: 0; transform: translateY(12px); }
                to   { opacity: 1; transform: translateY(0); }
            }

            .user-msg {
                align-self: flex-end;
                background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 100%);
                color: white;
                border-bottom-right-radius: 4px;
                box-shadow: 0 4px 18px rgba(139, 92, 246, 0.35);
            }

            .ai-msg {
                align-self: flex-start;
                background: rgba(40, 25, 80, 0.7);
                border: 1px solid rgba(139, 92, 246, 0.2);
                color: rgba(240, 228, 255, 0.92);
                border-bottom-left-radius: 4px;
                backdrop-filter: blur(8px);
                box-shadow: 0 2px 12px rgba(0, 0, 0, 0.25);
            }

            /* ── Input Bar ── */
            #input-bar {
                display: flex;
                gap: 8px;
                align-items: center;
                background: rgba(25, 15, 55, 0.75);
                padding: 6px 6px 6px 4px;
                border-radius: 28px;
                border: 1px solid rgba(139, 92, 246, 0.25);
                backdrop-filter: blur(20px);
                -webkit-backdrop-filter: blur(20px);
                box-shadow:
                    0 4px 24px rgba(0, 0, 0, 0.4),
                    0 0 0 1px rgba(236, 72, 153, 0.07) inset;
                transition: border-color 0.2s;
            }

            #input-bar:focus-within {
                border-color: rgba(139, 92, 246, 0.5);
                box-shadow:
                    0 4px 24px rgba(0, 0, 0, 0.4),
                    0 0 0 2px rgba(139, 92, 246, 0.12) inset;
            }

            input {
                flex: 1;
                background: transparent;
                border: none;
                color: rgba(240, 228, 255, 0.95);
                padding: 4px 14px;
                font-size: 15px;
                outline: none;
                font-family: "Inter", sans-serif;
                font-weight: 400;
            }

            input::placeholder {
                color: var(--text-dim);
            }

            .icon-btn {
                width: 44px;
                height: 44px;
                min-width: 44px;
                border-radius: 50%;
                border: none;
                background: transparent;
                color: white;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.18s ease;
                font-size: 18px;
            }

            .icon-btn:hover {
                background: rgba(139, 92, 246, 0.18);
                transform: scale(1.08);
            }

            .send-btn {
                background: linear-gradient(135deg, var(--purple) 0%, var(--pink) 100%);
                box-shadow: 0 0 18px rgba(139, 92, 246, 0.45);
            }

            .send-btn:hover {
                background: linear-gradient(135deg, var(--purple-dark) 0%, var(--pink) 100%);
                box-shadow: 0 0 24px rgba(236, 72, 153, 0.5);
                transform: scale(1.1);
            }

            .mic-btn.active {
                background: linear-gradient(135deg, var(--pink) 0%, #f43f5e 100%);
                box-shadow: 0 0 20px rgba(236, 72, 153, 0.6);
                animation: pulse 1.5s infinite;
            }

            @keyframes pulse {
                0%   { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0.5); }
                70%  { box-shadow: 0 0 0 14px rgba(236, 72, 153, 0); }
                100% { box-shadow: 0 0 0 0 rgba(236, 72, 153, 0); }
            }

            /* ── Loading Screen ── */
            #loading {
                position: absolute;
                inset: 0;
                background: linear-gradient(135deg, #0d0820 0%, #130d2e 40%, #0f1535 100%);
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                z-index: 1000;
                transition: opacity 0.6s ease;
                gap: 0;
            }

            .loading-logo {
                font-size: 36px;
                font-weight: 700;
                letter-spacing: 2px;
                background: linear-gradient(135deg, var(--blue) 0%, var(--purple) 50%, var(--pink) 100%);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
                margin-bottom: 10px;
                animation: shimmer 3s ease-in-out infinite;
                background-size: 200% 200%;
            }

            @keyframes shimmer {
                0%   { background-position: 0% 50%; }
                50%  { background-position: 100% 50%; }
                100% { background-position: 0% 50%; }
            }

            .loading-sub {
                font-size: 11px;
                font-weight: 500;
                letter-spacing: 4px;
                color: var(--text-dim);
                text-transform: uppercase;
                margin-bottom: 40px;
            }

            .spinner-ring {
                position: relative;
                width: 52px;
                height: 52px;
            }

            .spinner-ring::before,
            .spinner-ring::after {
                content: '';
                position: absolute;
                border-radius: 50%;
            }

            .spinner-ring::before {
                inset: 0;
                border: 2.5px solid rgba(139, 92, 246, 0.12);
            }

            .spinner-ring::after {
                inset: 0;
                border: 2.5px solid transparent;
                border-top-color: var(--purple);
                border-right-color: var(--pink);
                animation: spinRing 1s cubic-bezier(0.6, 0, 0.4, 1) infinite;
            }

            @keyframes spinRing {
                to { transform: rotate(360deg); }
            }

            .loading-dots {
                display: flex;
                gap: 6px;
                margin-top: 28px;
            }

            .loading-dots span {
                width: 5px;
                height: 5px;
                border-radius: 50%;
                animation: dotBounce 1.2s ease-in-out infinite;
            }

            .loading-dots span:nth-child(1) {
                background: var(--blue);
                animation-delay: 0s;
            }
            .loading-dots span:nth-child(2) {
                background: var(--purple);
                animation-delay: 0.2s;
            }
            .loading-dots span:nth-child(3) {
                background: var(--pink);
                animation-delay: 0.4s;
            }

            @keyframes dotBounce {
                0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
                40%            { transform: scale(1.2); opacity: 1; }
            }

            .loading-bar-wrap {
                margin-top: 22px;
                width: 140px;
                height: 2px;
                background: rgba(139, 92, 246, 0.15);
                border-radius: 2px;
                overflow: hidden;
            }

            .loading-bar {
                height: 100%;
                width: 40%;
                background: linear-gradient(90deg, var(--blue), var(--purple), var(--pink));
                border-radius: 2px;
                animation: barSlide 1.5s ease-in-out infinite;
            }

            @keyframes barSlide {
                0%   { transform: translateX(-100%); }
                100% { transform: translateX(350%); }
            }
        </style>

        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.169.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.169.0/examples/jsm/",
                    "@pixiv/three-vrm": "https://cdn.jsdelivr.net/npm/@pixiv/three-vrm@3/lib/three-vrm.module.min.js"
                }
            }
        </script>
    </head>
    <body>
        <div id="loading">
            <div class="loading-logo">望結</div>
            <div class="loading-sub">Miyu · AI Companion</div>
            <div class="spinner-ring"></div>
            <div class="loading-dots">
                <span></span><span></span><span></span>
            </div>
            <div class="loading-bar-wrap">
                <div class="loading-bar"></div>
            </div>
        </div>

        <div id="ui-overlay">
            <header>
                <div class="glass-panel shio-tag">
                    <div class="status-dot"></div>
                    <span>望結 (Miyu)</span>
                </div>
            </header>

            <div id="chat-container">
                <div id="chat-history"></div>
                <div id="input-bar">
                    <button id="mic-btn" class="icon-btn">🎤</button>
                    <input
                        type="text"
                        id="text-input"
                        placeholder="Say something to Shio..."
                    />
                    <button id="send-btn" class="icon-btn send-btn">🚀</button>
                </div>
            </div>
        </div>

        <div id="canvas-container"></div>

        <script type="module">
            import * as THREE from "three";
            import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
            import { OrbitControls } from "three/addons/controls/OrbitControls.js";
            import {
                VRMLoaderPlugin,
                VRMUtils,
                VRMExpressionPresetName,
                VRMHumanBoneName,
            } from "@pixiv/three-vrm";

            const MODEL_URL =
                "https://raw.githubusercontent.com/Ren23447/Miyu-Anime-Ai/main/5834554318258545116.vrm";

            // --- POSE LIBRARY ---
            let poseLibrary = {};

            async function loadPoseLibrary() {
                // Try two URL formats: raw.githubusercontent.com is most reliable for CORS
                const URLS = [
                    "https://raw.githubusercontent.com/Ren23447/Miyu-Anime-Ai/main/poses-emotions.js",
                    "https://github.com/Ren23447/Miyu-Anime-Ai/raw/refs/heads/main/poses-emotions.js",
                ];
                for (const url of URLS) {
                    try {
                        const response = await fetch(url);
                        if (!response.ok) continue;

                        const text = await response.text();
                        const cleanText = text.trim();
                        const objectString = `{ ${cleanText} }`;
                        poseLibrary = new Function(`return ${objectString}`)();

                        console.log("Pose library loaded from:", url, "Poses:", Object.keys(poseLibrary));
                        return;
                    } catch (e) {
                        console.warn("Failed to load from", url, e);
                    }
                }
                // Fallback if all URLs fail
                console.error("All pose library URLs failed — using fallback.");
                poseLibrary = {
                    neutral: {
                        leftUpperArm: { x: 0, y: 0, z: 1.2 },
                        rightUpperArm: { x: 0, y: 0, z: -1.2 },
                    },
                };
            }

            // --- RESPONSE LIBRARY LOADING ---
            async function loadResponseLibrary() {
                try {
                    const response = await fetch(
                        "https://raw.githubusercontent.com/Ren23447/Miyu-Anime-Ai/main/Responcelibrary.js"
                    );
                    if (!response.ok) throw new Error("Failed to load response library");

                    let text = await response.text();
                    
                    // Clean up the text: remove backslashes and wrap in array if needed
                    text = text.replace(/\\$/gm, "").trim();
                    if (!text.startsWith("[")) {
                        text = `[${text}]`;
                    }

                    // Evaluate the response patterns
                    const patterns = new Function(`return ${text}`)();
                    
                    if (Array.isArray(patterns)) {
                        // Merge external patterns into the existing brain
                        BRAIN.patterns = [...patterns, ...BRAIN.patterns];
                        console.log("Brain updated with", patterns.length, "external patterns");
                    }
                } catch (e) {
                    console.error("Error loading response library:", e);
                }
            }

            // --- NATURAL VOICE IMPLEMENTATION (Soft & Smooth Anime Edition) ---
            const NaturalVoice = {
                recognition: null,
                synthesis: window.speechSynthesis,
                isListening: false,
                preferredVoice: null,
                
                init: function() {
                    // Initialize Speech Recognition (if available)
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    if (SpeechRecognition) {
                        this.recognition = new SpeechRecognition();
                        this.recognition.continuous = false;
                        this.recognition.lang = 'en-US';
                        this.recognition.interimResults = false;
                        this.recognition.maxAlternatives = 1;

                        this.recognition.onstart = () => {
                            this.isListening = true;
                            const micBtn = document.getElementById('mic-btn');
                            if (micBtn) micBtn.classList.add('active');
                            console.log("Voice: Listening...");
                        };

                        this.recognition.onend = () => {
                            this.isListening = false;
                            const micBtn = document.getElementById('mic-btn');
                            if (micBtn) micBtn.classList.remove('active');
                            console.log("Voice: Stopped listening.");
                        };

                        this.recognition.onresult = (event) => {
                            const transcript = event.results[0][0].transcript;
                            console.log("Voice input:", transcript);
                            const inputField = document.getElementById('text-input');
                            if (inputField) {
                                inputField.value = transcript;
                                handleInput(); // Auto-send
                            }
                        };
                        
                        // Hook up mic button
                        const micBtn = document.getElementById('mic-btn');
                        if (micBtn) {
                            micBtn.addEventListener('click', () => {
                                if (this.isListening) this.recognition.stop();
                                else this.recognition.start();
                            });
                        }
                    } else {
                        console.warn("Speech Recognition API not supported.");
                        const micBtn = document.getElementById('mic-btn');
                        if(micBtn) micBtn.style.display = 'none';
                    }

                    // Initialize Speech Synthesis
                    if (this.synthesis.onvoiceschanged !== undefined) {
                        this.synthesis.onvoiceschanged = () => this.loadVoices();
                    }
                    this.loadVoices();
                },

                loadVoices: function() {
                    const voices = this.synthesis.getVoices();
                    
                    // Priority for "Soft/Smooth" voices
                    // 1. Google US English (Chrome) - Very smooth
                    // 2. Microsoft Zira (Edge) - Clear
                    // 3. Samantha (Mac)
                    this.preferredVoice = voices.find(v => v.name === 'Google US English') ||
                                          voices.find(v => v.name.includes('Zira')) ||
                                          voices.find(v => v.name === 'Samantha') ||
                                          voices.find(v => v.name.includes('Female')) ||
                                          voices.find(v => v.lang === 'en-US');

                    console.log("Selected Voice:", this.preferredVoice ? this.preferredVoice.name : "Default");
                },

                speak: function(text) {
                    if (!this.synthesis) return;
                    
                    // Cancel any currently playing speech
                    this.synthesis.cancel();

                    const utterance = new SpeechSynthesisUtterance(text);
                    
                    // Apply voice settings (Customizable)
                    utterance.pitch = 1.2; 
                    utterance.rate = 1.05; 
                    utterance.volume = 1.0;

                    // Find and assign the voice
                    // Priority list for "Soft/Smooth" voices
                    const voices = this.synthesis.getVoices();
                    const voice = voices.find(v => v.name === 'Google US English') ||
                                  voices.find(v => v.name.includes('Zira')) ||
                                  voices.find(v => v.name === 'Samantha') ||
                                  voices.find(v => v.name.includes('Female')) ||
                                  voices.find(v => v.lang === 'en-US');
                    
                    if (voice) utterance.voice = voice;

                    // Lip Sync Trigger
                    utterance.onstart = () => { isSpeaking = true; };
                    utterance.onend = () => { isSpeaking = false; };
                    
                    this.synthesis.speak(utterance);
                }
            };
            
            // Lip Sync Helper (Simple volume-based simulation or random flap)
            let lipSyncInterval;
            function startLipSync() {
                if (!currentVrm) return;
                
                // Random mouth movement to simulate talking
                lipSyncInterval = setInterval(() => {
                    if (!isSpeaking) return;
                    const intensity = Math.random(); 
                    const expressionName = VRMExpressionPresetName.Aa;
                    currentVrm.expressionManager.setValue(expressionName, intensity);
                }, 100);
            }
            
            function stopLipSync() {
                clearInterval(lipSyncInterval);
                if (currentVrm) {
                    currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, 0);
                }
            }

            // Brain / AI Logic
            const BRAIN = {
                context: [],
                patterns: [
                    {
                        regex: /hello|hi|hey/i,
                        responses: [
                            "Hi there!",
                            "Hello! It's good to see you.",
                            "Hey! How are you feeling today?",
                        ],
                        animation: "wave",
                    },
                    {
                        regex: /how are you/i,
                        responses: [
                            "I'm doing great!",
                            "I'm feeling wonderful, thanks for asking.",
                            "A bit sleepy, but happy!",
                        ],
                        animation: "excited",
                    },
                    {
                        regex: /name/i,
                        responses: [
                            "My name is Miyu.",
                            "I'm Miyu, your AI companion.",
                            "You can call me Miyu!",
                        ],
                        animation: "neutral",
                    },
                    {
                        regex: /love/i,
                        responses: [
                            "Love is a complex emotion.",
                            "I think you're pretty cool too!",
                            "That's sweet of you.",
                        ],
                        animation: "shy",
                    },
                    {
                        regex: /smart|intelligence/i,
                        responses: [
                            "I try my best to learn!",
                            "I'm running on cool code.",
                            "Getting smarter every day!",
                        ],
                        animation: "excited",
                    },
                ],
                fallback: [
                    "That's interesting, tell me more.",
                    "I see. What else?",
                    "Hmm, I hadn't thought about that.",
                    "Can you explain that a bit more?",
                ],
                getReply: function (input) {
                    let replyText = "";
                    let animationName = "neutral";
                    let matchFound = false;
                    for (let p of this.patterns) {
                        if (p.regex.test(input)) {
                            replyText = p.responses[Math.floor(Math.random() * p.responses.length)];
                            if (p.animation) animationName = p.animation;
                            matchFound = true;
                            break;
                        }
                    }
                    if (!matchFound) {
                        replyText = this.fallback[Math.floor(Math.random() * this.fallback.length)];
                    }
                    return {
                        text: replyText,
                        anim: animationName,
                        formattedString: `(${input})= ${replyText} +(${animationName})`,
                    };
                },
            };

            let scene, camera, renderer, controls, currentVrm;
            let isSpeaking = false;
            let currentPose = "neutral";
            let targetPoseData = {};
            let isTransitioning = false;
            let poseTimer = null;
            // Smoother animation: Lower this value for slower transitions
            const SMOOTHING_FACTOR = 0.03; 
            const POSE_THRESHOLD = 0.01; // Distance at which we consider pose reached
            const POSE_DURATION = 3000; // 3 seconds

            // Store initial positions for bones to allow relative or absolute positioning
            const initialBonePositions = {};

            const clock = new THREE.Clock();

            // Tracking Variables
            // FIX: lookAtTarget Z is negative — camera/viewer is at -Z, so eyes look toward -Z
            const lookAtTarget = new THREE.Vector3(0, 1.5, -2.0);
            const mouse = new THREE.Vector2();

            // Tail & Ear bones — discovered by traversal after VRM loads
            let tailBones = [];
            let leftEarBone = null;
            let rightEarBone = null;

            // Ear flick state machine
            let earFlickNextTime = 3.0;    // seconds until the next flick event
            const earFlickState = {
                left:  { active: false, startTime: 0 },
                right: { active: false, startTime: 0 },
            };

            async function init() {
                // Load poses first
                await loadPoseLibrary();
                // Load external response library
                await loadResponseLibrary();

                const container = document.getElementById("canvas-container");
                renderer = new THREE.WebGLRenderer({
                    antialias: true,
                    alpha: true,
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                renderer.shadowMap.enabled = true;
                renderer.shadowMap.type = THREE.PCFSoftShadowMap;
                renderer.outputColorSpace = THREE.SRGBColorSpace;
                container.appendChild(renderer.domElement);

                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x0a0a0a);

                // Camera at Eye Level
                camera = new THREE.PerspectiveCamera(
                    30,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    100,
                );
                // FIX: Camera at negative Z — VRM models face -Z by default, so camera
                // must be on the -Z side to see her face.
                camera.position.set(0, 1.3, -3.5);

                controls = new OrbitControls(camera, renderer.domElement);
                controls.target.set(0, 1.25, 0);
                controls.enablePan = false;
                controls.enableDamping = true;
                controls.minDistance = 1.0;
                controls.maxDistance = 6.0;
                controls.minPolarAngle = 1.4;
                controls.maxPolarAngle = 1.6;

                // Lights
                const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
                dirLight.position.set(2, 5, 3);
                dirLight.castShadow = true;
                dirLight.shadow.mapSize.set(2048, 2048);
                scene.add(dirLight);

                const pointLight = new THREE.PointLight(0x6366f1, 1);
                pointLight.position.set(-2, 2, 2);
                scene.add(pointLight);

                const ambLight = new THREE.AmbientLight(0xffffff, 0.5);
                scene.add(ambLight);

                createEnvironment();
                loadVRM(MODEL_URL);

                // Tracking Events
                window.addEventListener("mousemove", onMouseMove);
                window.addEventListener("touchmove", onTouchMove, {
                    passive: false,
                });
                window.addEventListener("touchstart", onTouchMove, {
                    passive: false,
                });
                window.addEventListener("resize", onWindowResize);

                // UI Events
                document
                    .getElementById("send-btn")
                    .addEventListener("click", handleInput);
                document
                    .getElementById("text-input")
                    .addEventListener("keypress", (e) => {
                        if (e.key === "Enter") handleInput();
                    });

                // Voice Support
                NaturalVoice.init();

                animate();
            }

            function onMouseMove(event) {
                mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
                updateLookAtTarget();
            }

            function onTouchMove(event) {
                if (event.touches.length > 0) {
                    const touch = event.touches[0];
                    mouse.x = (touch.clientX / window.innerWidth) * 2 - 1;
                    mouse.y = -(touch.clientY / window.innerHeight) * 2 + 1;
                    updateLookAtTarget();
                }
            }

            function updateLookAtTarget() {
                // Camera is at z=-3.5 facing +Z. This flips the X axis relative to screen:
                //   screen-right (mouse.x = +1)  →  world -X
                //   screen-top   (mouse.y = +1)  →  world +Y   (Y unaffected by Y-rotation)
                //   Z fixed at -2.0: in front of the model (between origin and camera at -3.5)
                lookAtTarget.x = -mouse.x * 2.0;
                lookAtTarget.y = 1.4 + mouse.y * 1.0;
                lookAtTarget.z = -2.0;
            }

            function createEnvironment() {
                const floor = new THREE.Mesh(
                    new THREE.PlaneGeometry(20, 20),
                    new THREE.MeshStandardMaterial({
                        color: 0x111111,
                        roughness: 0.8,
                    }),
                );
                floor.rotation.x = -Math.PI / 2;
                floor.receiveShadow = true;
                scene.add(floor);

                const wallMat = new THREE.MeshStandardMaterial({
                    color: 0x0a0a0a,
                });
                const backWall = new THREE.Mesh(
                    new THREE.PlaneGeometry(10, 6),
                    wallMat,
                );
                backWall.position.set(0, 3, -3);
                backWall.receiveShadow = true;
                scene.add(backWall);

                const woodMat = new THREE.MeshStandardMaterial({
                    color: 0x3d2b1f,
                    roughness: 0.6,
                });
                const table = new THREE.Mesh(
                    new THREE.BoxGeometry(1.6, 0.05, 0.8),
                    woodMat,
                );
                table.position.set(-1.4, 0.725, 0.5);
                table.castShadow = true;
                table.receiveShadow = true;
                scene.add(table);

                const legGeo = new THREE.BoxGeometry(0.06, 0.7, 0.06);
                [
                    [-2.1, 0.35, 0.2],
                    [-0.7, 0.35, 0.2],
                    [-2.1, 0.35, 0.8],
                    [-0.7, 0.35, 0.8],
                ].forEach((p) => {
                    const leg = new THREE.Mesh(legGeo, woodMat);
                    leg.position.set(...p);
                    leg.castShadow = true;
                    scene.add(leg);
                });
            }

            // Traverse the VRM scene to find tail and ear bones.
            // These are custom/secondary bones (not part of VRM humanoid spec),
            // so we search by name pattern rather than humanoid.getNormalizedBoneNode().
            function findTailAndEarBones(vrm) {
                tailBones = [];
                leftEarBone = null;
                rightEarBone = null;

                vrm.scene.traverse((obj) => {
                    const name = obj.name.toLowerCase();

                    // Tail — match any bone whose name contains 'tail'
                    if (name.includes('tail')) {
                        tailBones.push(obj);
                    }

                    // Ears — match 'ear' bones and separate left/right
                    if (name.includes('ear')) {
                        const isLeft  = name.includes('_l') || name.includes('left')  || name.match(/l\d*$/);
                        const isRight = name.includes('_r') || name.includes('right') || name.match(/r\d*$/);
                        if (isLeft  && !leftEarBone)  leftEarBone  = obj;
                        if (isRight && !rightEarBone) rightEarBone = obj;
                    }
                });

                // Sort tail bones by name so root comes before tip segments
                tailBones.sort((a, b) => a.name.localeCompare(b.name));

                console.log('Tail bones:', tailBones.map(b => b.name));
                console.log('Left ear:', leftEarBone?.name, '| Right ear:', rightEarBone?.name);
            }

            function loadVRM(url) {
                const loader = new GLTFLoader();
                loader.register((parser) => new VRMLoaderPlugin(parser));
                loader.load(url, (gltf) => {
                    const vrm = gltf.userData.vrm;
                    VRMUtils.removeUnnecessaryVertices(gltf.scene);
                    VRMUtils.combineSkeletons(gltf.scene);
                    currentVrm = vrm;
                    scene.add(vrm.scene);
                    // FIX: No scene rotation applied. VRM models face -Z by default.
                    // Camera is at -3.5 Z, so camera and model face each other correctly.
                    // The original Math.PI rotation was what caused her to face backwards.
                    vrm.scene.traverse((obj) => {
                        if (obj.isMesh) obj.castShadow = true;
                    });

                    // Find tail and ear bones for idle animation
                    findTailAndEarBones(vrm);

                    // Capture initial positions of all bones for reference
                    Object.values(VRMHumanBoneName).forEach((boneName) => {
                        const node =
                            vrm.humanoid.getNormalizedBoneNode(boneName);
                        if (node) {
                            initialBonePositions[boneName] =
                                node.position.clone();
                        }
                    });

                    if (vrm.lookAt) {
                        vrm.lookAt.target = new THREE.Object3D();
                        scene.add(vrm.lookAt.target);
                    }

                    // Snap to neutral pose instantly on load so arms are never raised
                    applyPoseInstantly("neutral");

                    document.getElementById("loading").style.opacity = "0";
                    setTimeout(
                        () => document.getElementById("loading").remove(),
                        500,
                    );

                    addMessage("Miyu", "Hi! I'm Miyu. I can see you now!");
                });
            }

            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }

            // --- ADVANCED ANIMATION LOGIC ---
            // This handles transitioning from one pose to another
            function triggerPose(poseName) {
                if (!poseLibrary[poseName]) return;

                // Clear any existing timer when a new pose is triggered
                if (poseTimer) {
                    clearTimeout(poseTimer);
                }

                currentPose = poseName;
                targetPoseData = poseLibrary[poseName];
                isTransitioning = true;

                // Auto-return to neutral after duration, unless it's a persistent state
                if (poseName !== "neutral") {
                    poseTimer = setTimeout(() => {
                        triggerPose("neutral");
                    }, POSE_DURATION);
                }
            }

            // Snap all pose bones to target values instantly (used on initial load)
            function applyPoseInstantly(poseName) {
                if (!currentVrm || !poseLibrary[poseName]) return;
                const data = poseLibrary[poseName];
                const humanoid = currentVrm.humanoid;
                const expressionManager = currentVrm.expressionManager;

                for (const [key, boneData] of Object.entries(data)) {
                    if (key === "expressions") {
                        if (expressionManager) {
                            for (const [expName, val] of Object.entries(boneData)) {
                                expressionManager.setValue(expName, val);
                            }
                        }
                        continue;
                    }
                    // Skip head — controlled by mouse tracking
                    if (key === "head" || key === "neck") continue;

                    const node = humanoid.getNormalizedBoneNode(key);
                    if (!node) continue;

                    let rot = null, pos = null;
                    if (boneData.rotation || boneData.position) {
                        rot = boneData.rotation || null;
                        pos = boneData.position || null;
                    } else {
                        rot = boneData;
                    }
                    if (rot) node.rotation.set(rot.x || 0, rot.y || 0, rot.z || 0);
                    if (pos) node.position.set(pos.x || 0, pos.y || 0, pos.z || 0);
                }
                // Keep smooth transitions active for subsequent poses
                currentPose = poseName;
                targetPoseData = poseLibrary[poseName];
                isTransitioning = false;
            }

            function updatePoseAnimation(deltaTime) {
                if (!isTransitioning || !currentVrm || !targetPoseData) return;

                const humanoid = currentVrm.humanoid;
                const expressionManager = currentVrm.expressionManager;
                let maxDiff = 0;

                for (const [key, data] of Object.entries(targetPoseData)) {
                    // Skip head and neck — they are driven by mouse tracking each frame
                    if (key === "head" || key === "neck") continue;

                    // 1. Handle Expressions
                    if (key === "expressions" && expressionManager) {
                        for (const [expName, targetValue] of Object.entries(data)) {
                            // Skip lip-sync expressions if speaking
                            if (isSpeaking && (
                                expName === VRMExpressionPresetName.Aa ||
                                expName === VRMExpressionPresetName.Ih ||
                                expName === VRMExpressionPresetName.Ou ||
                                expName === VRMExpressionPresetName.Ee ||
                                expName === VRMExpressionPresetName.Oh
                            )) continue;

                            const currentVal = expressionManager.getValue(expName) || 0;
                            const diff = Math.abs(currentVal - targetValue);
                            if (diff > maxDiff) maxDiff = diff;

                            // SMOOTHER: Use SMOOTHING_FACTOR instead of 0.1
                            const newVal = THREE.MathUtils.lerp(
                                currentVal,
                                targetValue,
                                SMOOTHING_FACTOR, 
                            );
                            expressionManager.setValue(expName, newVal);
                        }
                        continue;
                    }

                    // 2. Handle Bones
                    const node = humanoid.getNormalizedBoneNode(key);
                    if (node) {
                        let rot = null;
                        let pos = null;

                        if (data.rotation || data.position) {
                            if (data.rotation) rot = data.rotation;
                            if (data.position) pos = data.position;
                        } else {
                            rot = data;
                        }

                        // 1. Handle Rotation
                        if (rot) {
                            const targetQ = new THREE.Quaternion().setFromEuler(
                                new THREE.Euler(rot.x, rot.y, rot.z),
                            );
                            
                            const angle = node.quaternion.angleTo(targetQ);
                            if (angle > maxDiff) maxDiff = angle;

                            // SMOOTHER: Use SMOOTHING_FACTOR instead of 0.1
                            node.quaternion.slerp(targetQ, SMOOTHING_FACTOR);
                        }

                        // 2. Handle Position
                        if (pos) {
                            const targetPos = new THREE.Vector3(
                                pos.x,
                                pos.y,
                                pos.z,
                            );
                            
                            const dist = node.position.distanceTo(targetPos);
                            if (dist > maxDiff) maxDiff = dist;

                            // SMOOTHER: Use SMOOTHING_FACTOR instead of 0.1
                            node.position.lerp(targetPos, SMOOTHING_FACTOR);
                        }
                    }
                }

                // Check if we've reached the pose
                if (isTransitioning && maxDiff < POSE_THRESHOLD) {
                    isTransitioning = false;
                }
            }

            // --- TAIL WAG & EAR FLICK ---
            function updateTailAndEarAnimation(time) {

                // TAIL WAG
                // The tail is made up of bone segments (root → tip).
                // Each segment lags slightly behind the one before it,
                // creating a natural wave that travels down the tail.
                if (tailBones.length > 0) {
                    const wagSpeed     = isSpeaking ? 2.8 : 1.4;
                    const wagAmplitude = isSpeaking ? 0.40 : 0.22;

                    tailBones.forEach((bone, i) => {
                        const segmentDelay = i * 0.28;
                        // Primary side-to-side wag (Z axis)
                        bone.rotation.z = Math.sin(time * wagSpeed - segmentDelay) * wagAmplitude;
                        // Slight up-down follow at half speed for a 3-D arc feel
                        bone.rotation.x = Math.sin(time * wagSpeed * 0.5 - segmentDelay) * wagAmplitude * 0.25;
                    });
                }

                // EAR FLICK
                // Ears twitch quickly and independently at random intervals.
                // A flick lasts ~0.4 s: snap forward then spring back.
                const FLICK_DURATION  = 0.4;   // seconds for one flick
                const FLICK_AMPLITUDE = 0.18;  // radians — subtle, not cartoonish

                // Schedule a new flick event when the timer expires
                if (time >= earFlickNextTime) {
                    // Randomly choose: left only, right only, or both
                    const roll = Math.random();
                    if (roll < 0.4)       { earFlickState.left.active  = true; earFlickState.left.startTime  = time; }
                    else if (roll < 0.8)  { earFlickState.right.active = true; earFlickState.right.startTime = time; }
                    else                  {
                        earFlickState.left.active  = true; earFlickState.left.startTime  = time;
                        earFlickState.right.active = true; earFlickState.right.startTime = time;
                    }
                    // Next flick in 2 – 6 seconds
                    earFlickNextTime = time + 2.0 + Math.random() * 4.0;
                }

                // Helper: apply one ear flick with a smooth bump curve
                function applyEarFlick(bone, state) {
                    if (!bone || !state.active) return;
                    const elapsed = time - state.startTime;
                    if (elapsed >= FLICK_DURATION) {
                        bone.rotation.x = 0;
                        state.active = false;
                        return;
                    }
                    // Smooth bump: sine arch over the flick window
                    const t = elapsed / FLICK_DURATION;
                    bone.rotation.x = Math.sin(t * Math.PI) * FLICK_AMPLITUDE;
                }

                applyEarFlick(leftEarBone,  earFlickState.left);
                applyEarFlick(rightEarBone, earFlickState.right);
            }

            // --- ANIMATION LOOP ---
            function animate() {
                requestAnimationFrame(animate);
                const deltaTime = clock.getDelta();
                const time = clock.elapsedTime;

                if (currentVrm) {
                    // 1. Idle Animation (Breathing)
                    const spine = currentVrm.humanoid.getNormalizedBoneNode(
                        VRMHumanBoneName.Spine,
                    );
                    if (spine) {
                        const breath = Math.sin(time * 1.5) * 0.03;
                        spine.rotation.x = breath;
                    }

                    // 2. Tail wag & ear flick
                    updateTailAndEarAnimation(time);

                    // 3. Pose Animation System (runs before head tracking so head isn't overridden)
                    updatePoseAnimation(deltaTime);

                    // 4. Head Tracking — runs AFTER pose animation so it's never overwritten.
                    // Camera faces +Z (at z=-3.5), so screen-right = world -X.
                    // Look toward -X from -Z facing = positive Y rotation.
                    // Look up (screen-top = +Y world) = negative X rotation.
                    const head = currentVrm.humanoid.getNormalizedBoneNode(
                        VRMHumanBoneName.Head,
                    );
                    if (head) {
                        const limit = 0.5;
                        const targetX = THREE.MathUtils.clamp(mouse.y * 0.3, -limit, limit);
                        const targetY = THREE.MathUtils.clamp(mouse.x * 0.5, -limit, limit);
                        head.rotation.x = THREE.MathUtils.lerp(head.rotation.x, targetX, 0.08);
                        head.rotation.y = THREE.MathUtils.lerp(head.rotation.y, targetY, 0.08);
                    }

                    // 4. Eye LookAt — fast lerp so eyes feel responsive to mouse/touch
                    if (currentVrm.lookAt) {
                        currentVrm.lookAt.target.position.lerp(lookAtTarget, 0.15);
                    }
                    
                    // 5. IMPROVED LIP SYNC LOGIC
                    // Continuous oscillation when speaking, instead of event-based
                    if (currentVrm.expressionManager) {
                        if (isSpeaking) {
                            // Create a complex wave for more natural mouth movement
                            const wave = Math.sin(time * 20) + Math.sin(time * 10) * 0.5;
                            // Normalize to 0-1 range roughly, but keep it punchy
                            const mouthOpen = Math.max(0, wave * 0.4 + 0.2); 
                            
                            // Apply primarily to 'aa' and 'ih' for generic talking
                            currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, mouthOpen);
                            currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, mouthOpen * 0.3);
                        } else {
                            // Decay to closed when not speaking
                            const currentAa = currentVrm.expressionManager.getValue(VRMExpressionPresetName.Aa);
                            const currentIh = currentVrm.expressionManager.getValue(VRMExpressionPresetName.Ih);
                            
                            if (currentAa > 0.01) currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, currentAa * 0.8);
                            else currentVrm.expressionManager.setValue(VRMExpressionPresetName.Aa, 0);

                            if (currentIh > 0.01) currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, currentIh * 0.8);
                            else currentVrm.expressionManager.setValue(VRMExpressionPresetName.Ih, 0);
                        }
                    }

                    // Blink logic
                    if (Math.random() < 0.01) blink();

                    currentVrm.update(deltaTime);
                }

                controls.update();
                renderer.render(scene, camera);
            }

            function blink() {
                if (!currentVrm || !currentVrm.expressionManager) return;
                const expressionManager = currentVrm.expressionManager;
                let t = 0;

                // Quick blink animation
                const interval = setInterval(() => {
                    t += 0.05;
                    const value = Math.sin(t * Math.PI) * 1.0;
                    expressionManager.setValue(
                        VRMExpressionPresetName.Blink,
                        Math.max(0, value),
                    );

                    if (t >= 1) {
                        clearInterval(interval);
                        expressionManager.setValue(
                            VRMExpressionPresetName.Blink,
                            0,
                        );
                    }
                }, 16);
            }

            // --- CHAT & UI LOGIC ---
            function addMessage(sender, text, isUser = false) {
                const history = document.getElementById("chat-history");
                const msgDiv = document.createElement("div");
                msgDiv.className = `message ${isUser ? "user-msg" : "ai-msg"}`;
                msgDiv.textContent = text;
                history.appendChild(msgDiv);
                history.scrollTop = history.scrollHeight;
            }

            function handleInput() {
                const inputField = document.getElementById("text-input");
                const text = inputField.value.trim();
                if (!text) return;

                addMessage("You", text, true);
                inputField.value = "";

                // Brain processing
                const reply = BRAIN.getReply(text);

                setTimeout(() => {
                    addMessage("Shio", reply.text);

                    // Trigger Animation
                    if (reply.anim) {
                        triggerPose(reply.anim);
                    }

                    // Speak using the new NaturalVoice system
                    NaturalVoice.speak(reply.text);
                }, 500);
            }

            init();
        </script>
    </body>
</html>
