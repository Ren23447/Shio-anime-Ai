<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shio Response Generator - Professional</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Professional Modern Pink & White Palette */
            --primary: #ff4d94;
            --primary-light: #ff85b3;
            --primary-dark: #e6005c;
            --secondary: #fff0f6;
            --bg: #fafbfc;
            --card: #ffffff;
            --text-main: #1a1d21;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1);
            --pink-shadow: rgba(255, 77, 148, 0.2);
        }

        * {
            box-sizing: border-box;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Plus Jakarta Sans', sans-serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            line-height: 1.5;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            max-width: 600px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--text-main);
            margin: 0 0 12px 0;
            letter-spacing: -0.025em;
            background: linear-gradient(135deg, var(--text-main) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin: 0;
        }

        .container {
            max-width: 1100px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 32px;
        }

        @media(min-width: 992px) {
            .container {
                grid-template-columns: 1.2fr 0.8fr;
            }
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 32px;
            box-shadow: var(--shadow-md);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card:hover {
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .section-title h2 {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            margin: 0;
        }

        .section-title .icon-circle {
            width: 32px;
            height: 32px;
            background: var(--secondary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-weight: bold;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select, textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--pink-shadow);
        }

        .response-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .response-row {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9375rem;
            cursor: pointer;
            border: none;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: 0 4px 12px var(--pink-shadow);
        }

        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--pink-shadow);
        }

        .btn-secondary {
            background: var(--secondary);
            color: var(--primary);
        }

        .btn-secondary:hover {
            background: #ffe0ed;
            color: var(--primary-dark);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
            background: var(--secondary);
        }

        .btn-icon {
            width: 46px;
            height: 46px;
            padding: 0;
            flex-shrink: 0;
        }

        pre {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 24px;
            border-radius: 16px;
            overflow-x: auto;
            margin: 0;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.875rem;
            line-height: 1.6;
            border: 1px solid #333;
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: #ecfdf5;
            color: #059669;
            border-radius: 99px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: currentColor;
            border-radius: 50%;
        }

        /* Loading Animation */
        .shimmer {
            background: linear-gradient(90deg, #f0f0f0 25%, #f8f8f8 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { 
            background: var(--border); 
            border-radius: 5px; 
            border: 2px solid var(--bg);
        }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Shio Generator</h1>
        <p>Craft custom response logic for your anime waifu interaction system with professional-grade generation.</p>
    </div>

    <div class="container">
        <!-- Configuration Side -->
        <div class="card">
            <div class="section-title">
                <div class="icon-circle">1</div>
                <h2>Configuration</h2>
            </div>
            
            <div class="form-group">
                <label>Trigger Keywords</label>
                <input type="text" id="triggers" placeholder="e.g. hello, hi, morning" oninput="updateCode()">
                <small style="color: var(--text-muted); font-size: 0.75rem;">Comma or pipe separated list of words that trigger this response.</small>
            </div>
            
            <div class="form-group">
                <label>Response Variations</label>
                <div id="responses-container" class="response-list">
                    <div class="response-row">
                        <input type="text" class="response-input" placeholder="Enter a response variation..." oninput="updateCode()">
                    </div>
                </div>
                <button class="btn btn-secondary" onclick="addResponse()" style="margin-top: 8px;">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                    Add Variation
                </button>
            </div>
            
            <div class="form-group">
                <label>Animation Behavior</label>
                <select id="pose-select" onchange="updateCode()">
                    <option value="neutral">Synchronizing animations...</option>
                </select>
            </div>
        </div>

        <!-- Output Side -->
        <div class="card">
            <div class="code-header">
                <div class="section-title" style="margin-bottom: 0;">
                    <div class="icon-circle">2</div>
                    <h2>Generated Logic</h2>
                </div>
                <div class="status-badge" id="status-badge">
                    <div class="status-dot"></div>
                    READY
                </div>
            </div>
            
            <div style="position: relative;">
                <pre id="code-output">// Configure triggers to generate code...</pre>
            </div>

            <button class="btn btn-primary copy-btn" onclick="copyCode()" style="width: 100%;">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                Copy to Clipboard
            </button>
        </div>
    </div>

    <script>
        const POSES_URL = "https://raw.githubusercontent.com/Ren23449-ux/Shio-anime-waifu/refs/heads/main/poses-emotions.js";
        
        async function fetchPoses() {
            const select = document.getElementById('pose-select');
            try {
                const res = await fetch(POSES_URL);
                if (!res.ok) throw new Error("Connection failed");
                const text = await res.text();
                
                // FIXED LOGIC: We only want the top-level keys which are the animation names
                // The previous regex was matching internal bone names because they follow the same pattern
                // We target keys followed by '": {' at the start of a line or after a comma, 
                // but specifically looking for the "main" ones which usually don't have deeply nested indentation.
                
                // This regex specifically targets keys that are immediately followed by an opening brace
                // and are likely top-level poses.
                const regex = /^\s*["']?(\w+)["']?:\s*{\s*(?:"|'|\w+)/gm;
                const matches = [...text.matchAll(regex)];
                let poses = [...new Set(matches.map(m => m[1]))];

                // Filter out common bone names to be safe, ensuring only animation names remain
                const bones = ['left', 'right', 'head', 'neck', 'spine', 'chest', 'rotation', 'position', 'expressions'];
                poses = poses.filter(p => !bones.some(b => p.toLowerCase().includes(b.toLowerCase()))).sort();
                
                if (poses.length === 0) {
                    // Fallback to specific known animations if regex fails
                    poses = ["neutral", "wave", "shy", "excited", "determined"];
                }
                
                select.innerHTML = poses.map(p => `
                    <option value="${p}">${p.charAt(0).toUpperCase() + p.slice(1)}</option>
                `).join('');
                
                select.value = poses.includes("neutral") ? "neutral" : poses[0];
                updateCode();
            } catch (e) {
                console.error("Fetch error:", e);
                select.innerHTML = '<option value="neutral">Neutral (Offline)</option>';
            }
        }

        function addResponse() {
            const container = document.getElementById('responses-container');
            const div = document.createElement('div');
            div.className = 'response-row';
            div.innerHTML = `
                <input type="text" class="response-input" placeholder="Enter variation..." oninput="updateCode()">
                <button class="btn btn-outline btn-icon" onclick="this.parentElement.remove(); updateCode()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            `;
            container.appendChild(div);
            div.querySelector('input').focus();
        }

        function updateCode() {
            const triggers = document.getElementById('triggers').value;
            const responseInputs = document.querySelectorAll('.response-input');
            const pose = document.getElementById('pose-select').value || "neutral";
            
            const regexPattern = triggers
                .split(/[,|]/)
                .map(w => w.trim())
                .filter(Boolean)
                .join("|");
                
            const responses = Array.from(responseInputs)
                .map(input => input.value.trim())
                .filter(Boolean);
            
            const formattedResponses = responses.length > 0 
                ? responses.map(r => `        "${r.replace(/"/g, '\\"')}",`).join("\n")
                : `        "Your response here...",`;

            const code = `{
    regex: /${regexPattern || "hello|hi"}/i,
    responses: [
${formattedResponses}
    ],
    animation: "${pose}",
},`;

            document.getElementById('code-output').textContent = code;
            
            const badge = document.getElementById('status-badge');
            badge.style.background = '#eff6ff';
            badge.style.color = '#2563eb';
            badge.innerHTML = '<div class="status-dot"></div> UPDATED';
            setTimeout(() => {
                badge.style.background = '#ecfdf5';
                badge.style.color = '#059669';
                badge.innerHTML = '<div class="status-dot"></div> READY';
            }, 1000);
        }

        function copyCode() {
            const code = document.getElementById('code-output').textContent;
            navigator.clipboard.writeText(code);
            const btn = document.querySelector('.copy-btn');
            const originalHTML = btn.innerHTML;
            
            btn.style.background = '#059669';
            btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg> Copied!`;
            
            setTimeout(() => {
                btn.style.background = '';
                btn.innerHTML = originalHTML;
            }, 2000);
        }

        // Initialize
        fetchPoses();
        updateCode();
    </script>
</body>
</html>
